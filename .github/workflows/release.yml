name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-typescript:
    name: TypeScript (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortex
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npm install
      - run: npm run build
      - run: npx vitest run

  test-contextscore:
    name: Python (contextscore tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contextscore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - run: pip install pytest
      - run: pytest tests/ -v

  release:
    name: Create GitHub Release
    needs: [test-typescript, test-contextscore]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract version from plugin.json
        id: plugin
        run: |
          PLUGIN_VERSION=$(jq -r .version .claude-plugin/plugin.json)
          echo "plugin_version=v$PLUGIN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches plugin.json
        run: |
          if [ "${{ steps.version.outputs.version }}" != "${{ steps.plugin.outputs.plugin_version }}" ]; then
            echo "ERROR: Tag ${{ steps.version.outputs.version }} does not match plugin.json version ${{ steps.plugin.outputs.plugin_version }}"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
